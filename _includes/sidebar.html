<div class="col-md-4 mt20">
  <div class="post-img">
   {% if page.img %}
   <img width="600" src="{{site.baseurl}}/images/{{page.img}}" alt="{{page.title}}">
   {% else %}
   <img width="600" src="{{site.baseurl}}/images/{{site.default-image}}" alt="site image">
   {% endif %}
 </div>
 <hr>
 <div id="tanitim" class="mt10">
   <h2>Online Dersler</h2>
   <a href="http://egitim.siberoloji.com" target="_blank"><img width="300" height="250" src="{{site.baseurl}}/images/reklamkare.png" alt="online dersler"></a>
 </div>
 <hr>
 <div id="btcwidget " class="mt10">
<h2>Piyasalar</h2> 
<script type="text/javascript">
baseUrl = "https://widgets.cryptocompare.com/";
var scripts = document.getElementsByTagName("script");
var embedder = scripts[ scripts.length - 1 ];
(function (){
var appName = encodeURIComponent(window.location.hostname);
if(appName==""){appName="local";}
var s = document.createElement("script");
s.type = "text/javascript";
s.async = true;
var theUrl = baseUrl+'serve/v1/coin/multi?fsyms=BTC,ETH,XMR,LTC,DASH&tsyms=USD,EUR,CNY,GBP';
s.src = theUrl + ( theUrl.indexOf("?") >= 0 ? "&" : "?") + "app=" + appName;
embedder.parentNode.appendChild(s);
})();
</script>
</div>
 <div class="mt10 recent">
   
   <h2>Son Yazılar</h2>        
   <ul>
    {% for post in site.related_posts limit:6 %}

    <li>
      <p><a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a><small>&nbsp;&nbsp;{{ post.date | date_to_string }}</small></p>
    </li>

    {% endfor %}
  </ul>
  
</div>
